{{ define "main" }}

<!-- Mini hero de práctica -->
<section class="hero">
  <div class="container" style="text-align: center;">
    <h1>{{ .Title }}</h1>
    {{ if .Date }}
    <p>{{ .Date.Format "2 de January de 2006" }}</p>
    {{ end }}
  </div>
</section>

  <!-- Contenido del reporte -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- Botón volver -->
        <div class="mb-4">
          <a href="{{ "/" | absURL }}" class="btn btn-custom">← Volver al menú</a>
        </div>

        <!-- Cuerpo del artículo -->
        <article class="practica-content">
          {{ .Content }}
        </article>

        <!-- Botón volver (al final) -->
        <div class="mt-5 pt-3 border-top">
          <a href="{{ "/" | absURL }}" class="btn btn-custom">← Volver al menú</a>
        </div>

      </div>
    </div>
  </div>

{{ end }}
